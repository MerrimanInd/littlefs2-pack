# This TOML sets the parameters for the LittleFS image
# This file is then read by both the firmware for use with
# the on-device bindings and the `littlefs` tool to create
# the image.
[image]
# Optionally, give your image a name. This is the name sans file extension
# as multiple files will be generated (`.bin`, `.rs`) etc.
# If no name is provided it will default to a const, `filesystem`.
name = "littlefs"

# Filesystem block (erase unit) size in bytes.
# Must be >= 128 and a multiple of both read-size and write-size.
# Power-of-two values recommended (e.g. 256, 4096).
block_size = 4096

# Minimum read size / page size in bytes.
# If only --page-size is given it sets both read and write size.
page_size = 256

# Minimum read size in bytes (overrides page_size for reads).
read_size = 16

# Minimum program (write) size in bytes (overrides page_size for writes).
write_size = 512

#!! Either block_count or image_size should be defined but not both
#!! image_size is block_size * block_count
#!! block_count is image_size / block_size
# Total number of blocks in the filesystem.
block_count = 3096
# Total image size in bytes (alternative to --block-count).
# Must be an exact multiple of --block-size.
# image_size = 15_998_976

# Block-cycle count for wear leveling.
# Higher values are more performant but less wear-leveled.
# -1 (the default) disables wear leveling entirely, which is fine for
# one-shot image creation. Add wear leveling if your application
# will be regularly writing to the partition.
# If this parameter is not set in the TOML file then the default
# of -1 will be applied.
block_cycles = -1

# Cache Size & Lookahead Size
# These two parameters aren't used by `littlefs2-pack` at all but
# defining them alongside the rest of the image parameters allows
# this tool to emit a complete impl Storage trait for the on-device
# `littlefs2` implementation to use and consume
#
# Cache size is the size in bytes of the read and write syzes
# It must be a multiple of both read and write size as well as
# a divisor of block size.
cache_size = 256
# The lookahead size is measured in units of 8 bytes.
lookahead_size = 8

# The settings relevant to the local directory to be synced to
# the microcontroller, including path and ignores
[directory]

# The local root folder of the directory to be synced
root = "./website"

# The maximum recursive directory depth to sync.
# -1 is unlimited depth
depth = -1

# Ignore hidden files and folders
ignore_hidden = true

# Whether to ignore files and folders as specificed by
# the local .gitignore files
gitignore = true
# Check the repository level .gitignore and ignore files
# and folders defined there as well
repo_gitignore = true

# A list of global ignores to add to the ignore list
glob_ignores = ["*.bkup", "build"]

# A list of global includes that supersede all other
# ignores, both globs and gitignores
glob_includes = []

# The flash settings are used by the `littlefs flash` command to
# flash the binary and then the filesystem image.

# The firmware flash command, run against the arg passed in by
# cargo run. This can't autostart a monitor/attach command or
# it would block the image write.
# The {path} variable is provided by the argument appended to the
# `littlefs flash` command by the `cargo run` call.
[flash.firmware]
command = "espflash flash --chip esp32s3 --log-format defmt {path}"
# Alternatively, the path argument can be overridden with a hardcoded
# version so that this command can be used standalone without `cargo run`
# This will always be superseded by a passed-in arg.
path = "/path/to/binary"

# The filesystem image flash command, this runs after the flash
# and writes the image to memory.
[flash.filesystem]
command = "esptool --chip esp32s3 --port /dev/ttyACM0 write-flash {address} {path} --flash-size 16MB"
# The path is optional, if ommitted it will be populated with the image name and the OUT_DIR
# environment variable
path = "../../target/xtensa-esp32s3-none-elf/release/build/esp32-littlefs-server-e2ca65db453fd1fa/out/filesystem.bin"
# The address to write the filesystem to
address = "0x200000"
# Alternatively, for an ESP32 project, the address can be read from the `partitions.csv` table
# and the name of the partition. This and the address are mutually exclusive.
partition_table = "./partitions.csv"
partition_name = "littlefs"

# The device monitor command runs after the filesystem image write
# to start a debug session
[flash.monitor]
command = "espflash monitor --after hard-reset"
